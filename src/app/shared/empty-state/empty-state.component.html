<div class="empty-state" [class.empty-state--compact]="compact">
  <div *ngIf="icon" class="empty-state__icon" aria-hidden="true">{{ icon }}</div>
  <h2 *ngIf="title" class="empty-state__title">{{ title }}</h2>
  <p *ngIf="message" class="empty-state__message">{{ message }}</p>
  <div class="empty-state__actions" *ngIf="!compact || icon || title || message">
    <ng-content></ng-content>
  </div>
</div>
