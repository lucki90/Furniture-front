<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <!-- Header -->
    <div class="sidebar-header">
      <div class="sidebar-logo">🪑</div>
      <span class="sidebar-title">FurniturePro</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <!-- Dashboard -->
      <div class="nav-section">
        <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
          <span class="nav-item-icon">📊</span>
          <span class="nav-item-text">Dashboard</span>
        </a>
      </div>

      <!-- Szafki -->
      <div class="nav-section">
        <div class="nav-section-title">Szafki</div>
        <a class="nav-item" routerLink="/alone-cabinet" routerLinkActive="active">
          <span class="nav-item-icon">📦</span>
          <span class="nav-item-text">Pojedyncza szafka</span>
        </a>
      </div>

      <!-- Kuchnia -->
      <div class="nav-section">
        <div class="nav-section-title">Kuchnia</div>
        <a class="nav-item" routerLink="/kitchen/projects" routerLinkActive="active">
          <span class="nav-item-icon">📁</span>
          <span class="nav-item-text">Projekty</span>
        </a>
        <a class="nav-item" routerLink="/kitchen" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span class="nav-item-icon">🍳</span>
          <span class="nav-item-text">Nowy projekt</span>
        </a>
      </div>

      <!-- Panel Administracyjny -->
      <div class="nav-section">
        <div class="nav-section-title">Administracja</div>
        <a class="nav-item" routerLink="/admin/materials" routerLinkActive="active">
          <span class="nav-item-icon">🪵</span>
          <span class="nav-item-text">Zarządzanie materiałami</span>
        </a>
      </div>

      <!-- Ustawienia -->
      <div class="nav-section">
        <a class="nav-item" routerLink="/settings" routerLinkActive="active">
          <span class="nav-item-icon">⚙️</span>
          <span class="nav-item-text">Ustawienia</span>
        </a>
      </div>
    </nav>

    <!-- Language Switcher -->
    <div class="language-switcher">
      <select
        [value]="languageService.lang()"
        (change)="onLanguageChange($event)"
        class="lang-select"
        title="Język / Language">
        <option *ngFor="let l of languageService.supportedLanguages" [value]="l.code">{{ l.label }}</option>
      </select>
    </div>

    <!-- Toggle Button -->
    <div class="sidebar-toggle">
      <button class="toggle-btn" (click)="toggleSidebar()" [title]="sidebarCollapsed ? 'Rozwiń menu' : 'Zwiń menu'">
        {{ sidebarCollapsed ? '→' : '←' }}
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" [class.sidebar-collapsed]="sidebarCollapsed">
    <router-outlet></router-outlet>
  </main>

  <!-- Toast Notifications -->
  <app-toast-container></app-toast-container>
</div>
