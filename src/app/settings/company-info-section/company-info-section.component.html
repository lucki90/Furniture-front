<mat-expansion-panel>
  <mat-expansion-panel-header>
    <mat-panel-title>
      <mat-icon class="panel-icon">business</mat-icon>
      Dane firmy
    </mat-panel-title>
  </mat-expansion-panel-header>

  <!-- Logo firmy -->
  <div class="logo-field">
    <div class="logo-field-label">
      Logo firmy
      <span class="logo-field-hint">· PNG / JPEG · max 500 KB</span>
    </div>

    <!-- Stan: brak logo -->
    <div *ngIf="!companyLogoUrl" class="logo-dropzone">
      <span class="logo-dropzone-icon">🖼️</span>
      <span class="logo-dropzone-text">Nie ustawiono logo</span>
      <label class="btn btn-sm logo-upload-btn" [class.disabled]="logoUploading">
        <span *ngIf="logoUploading" class="spinner spinner-sm logo-spinner"></span>
        {{ logoUploading ? 'Przesyłanie…' : 'Wybierz plik' }}
        <input type="file" accept="image/png,image/jpeg"
               (change)="onLogoSelected($event)"
               [disabled]="logoUploading"
               style="display:none;" />
      </label>
    </div>

    <!-- Stan: logo ustawione -->
    <div *ngIf="companyLogoUrl" class="logo-filled">
      <div class="logo-img-wrap">
        <img [src]="companyLogoUrl" alt="Logo firmy" class="logo-img" />
      </div>
      <div class="logo-filled-actions">
        <label class="btn btn-sm btn-outline" [class.disabled]="logoUploading">
          <span *ngIf="logoUploading" class="spinner spinner-sm logo-spinner"></span>
          {{ logoUploading ? 'Przesyłanie…' : 'Zmień' }}
          <input type="file" accept="image/png,image/jpeg"
                 (change)="onLogoSelected($event)"
                 [disabled]="logoUploading"
                 style="display:none;" />
        </label>
        <button class="btn btn-sm btn-danger-outline"
                (click)="removeLogo()" [disabled]="logoUploading">
          Usuń
        </button>
      </div>
    </div>

    <p *ngIf="logoError" class="logo-error">{{ logoError }}</p>
  </div>

  <div class="form-grid">
    <app-form-field label="Nazwa firmy" hint="Wyświetlana w nagłówku oferty (max 255 znaków)">
      <input type="text" class="form-control" [(ngModel)]="companyName"
             maxlength="255" placeholder="np. Studio Mebli XYZ" />
    </app-form-field>

    <app-form-field label="Adres" hint="Adres firmy (max 500 znaków)">
      <input type="text" class="form-control" [(ngModel)]="companyAddress"
             maxlength="500" placeholder="np. ul. Stolarska 5, 00-001 Warszawa" />
    </app-form-field>

    <app-form-field label="Telefon" hint="Numer telefonu firmy (max 50 znaków)">
      <input type="text" class="form-control" [(ngModel)]="companyPhone"
             maxlength="50" placeholder="np. +48 600 100 200" />
    </app-form-field>

    <app-form-field label="E-mail" hint="Adres e-mail firmy (max 255 znaków)">
      <input type="email" class="form-control" [(ngModel)]="companyEmail"
             maxlength="255" placeholder="np. kontakt@meble.pl" />
    </app-form-field>

    <app-form-field label="Ważność oferty" unit="dni" hint="Liczba dni ważności oferty PDF (1–365)">
      <input type="number" class="form-control" [(ngModel)]="offerValidityDays"
             min="1" max="365" step="1" />
    </app-form-field>
  </div>

</mat-expansion-panel>
