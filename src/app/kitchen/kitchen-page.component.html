<div class="kitchen-page">
  <!-- PAGE HEADER -->
  <app-kitchen-page-header
    [projectDisplayName]="currentProjectName() || 'Nowy projekt kuchni'"
    [projectId]="currentProjectId()"
    [projectVersion]="currentProjectVersion()"
    [projectSubtitle]="'Projektuj i wyceniaj zabudowe kuchenna'"
    [projectStatusLabel]="currentProjectStatusLabel"
    [projectStatusColor]="currentProjectStatusColor"
    [allowedTransitions]="currentProjectTransitionOptions"
    [isChangingStatus]="isChangingStatus"
    [isSavingProject]="isSavingProject"
    [isCalculatingProject]="isCalculatingProject"
    [totalCabinetCount]="totalCabinetCount()"
    [hasProjectId]="!!currentProjectId()"
    (saveProject)="onSaveProject()"
    (calculateProject)="calculateProject()"
    (statusChange)="onStatusChange($event)">
  </app-kitchen-page-header>

  <!-- ============ SEKCJA 1: WIZUALIZACJA + FORMULARZ ============ -->
  <app-kitchen-workspace-section
    [editingCabinetId]="editingCabinetId"
    [editingCabinet]="editingCabinet"
    [hasSelectedWall]="!!selectedWall()"
    [selectedWallLabel]="selectedWallLabel"
    [wallLength]="wallLength"
    [wallHeight]="wallHeight"
    (addWallRequested)="onAddWallRequested()"
    (wallRemoved)="onWallRemoved($event)"
    (wallLengthChange)="wallLength = $event"
    (wallHeightChange)="wallHeight = $event"
    (wallConfigChanged)="onWallConfigChanged()"
    (cabinetCalculated)="onCabinetCalculated($event)"
    (cancelEdit)="onCancelEdit()">
  </app-kitchen-workspace-section>

  <!-- ============ SEKCJA 2: PODSUMOWANIE + LISTA SZAFEK ============ -->
  <app-kitchen-cabinets-section
    [result]="result"
    [hasEditingCabinet]="!!editingCabinet"
    [cabinets]="cabinets()"
    [selectedWallLabel]="selectedWallLabel"
    [selectedWallTotalCost]="selectedWallTotalCost()"
    [totalCabinetCount]="totalCabinetCount()"
    [totalCost]="totalCost()"
    [fitsOnWall]="fitsOnWall()"
    [editingCabinetId]="editingCabinetId"
    (clearSelectedWallCabinets)="clearSelectedWallCabinets()"
    (editCabinet)="onEditCabinet($event)"
    (removeCabinet)="onRemoveCabinet($event)"
    (cloneCabinet)="onCloneCabinet($event)">
  </app-kitchen-cabinets-section>

  <!-- ============ SEKCJA 3: MATERIALY I KOSZTY ============ -->
  <app-kitchen-costs-section
    [projectResult]="projectResult"
    [totalCabinetCount]="totalCabinetCount()"
    [selectedWallLabel]="selectedWallLabel"
    [selectedWallCabinetCount]="cabinets().length"
    [totalWidth]="totalWidth()"
    [fitsOnWall]="fitsOnWall()"
    [remainingWidth]="remainingWidth()"
    [selectedWallTotalCost]="selectedWallTotalCost()"
    [wallsCount]="walls().length"
    [totalCost]="totalCost()"
    [editingCabinetId]="editingCabinetId"
    [isCalculatingProject]="isCalculatingProject"
    [pricingWarnings]="pricingWarnings"
    [aggregatedBoards]="aggregatedBoards"
    [aggregatedComponents]="aggregatedComponents"
    [aggregatedJobs]="aggregatedJobs"
    [wasteDetails]="wasteDetails"
    [totalAggregatedBoardsCost]="totalAggregatedBoardsCost"
    [totalAggregatedComponentsCost]="totalAggregatedComponentsCost"
    [totalAggregatedJobsCost]="totalAggregatedJobsCost"
    [adjustedComponentCost]="adjustedComponentCost"
    [adjustedTotalCost]="adjustedTotalCost"
    [totalWasteCost]="totalWasteCost"
    [includeWasteCost]="includeWasteCost"
    [activeDetailsTab]="activeDetailsTab"
    [currentProjectId]="currentProjectId()"
    [pricing]="pricing"
    [isPricingLoading]="isPricingLoading"
    [isPricingSaving]="isPricingSaving"
    [isPdfDownloading]="isPdfDownloading"
    [pricingDiscountPct]="pricingDiscountPct"
    [pricingManualOverrideEnabled]="pricingManualOverrideEnabled"
    [pricingManualOverride]="pricingManualOverride"
    [pricingOfferNotes]="pricingOfferNotes"
    (calculateProject)="calculateProject()"
    (clearAll)="clearAll()"
    (includeWasteCostChange)="includeWasteCost = $event"
    (activeDetailsTabChange)="activeDetailsTab = $event"
    (pricingTabRequested)="loadPricing()"
    (pricingDiscountPctChange)="pricingDiscountPct = $event"
    (pricingManualOverrideEnabledChange)="pricingManualOverrideEnabled = $event"
    (pricingManualOverrideChange)="pricingManualOverride = $event"
    (pricingOfferNotesChange)="pricingOfferNotes = $event"
    (savePricing)="savePricing()"
    (downloadOfferPdf)="downloadOfferPdf()">
  </app-kitchen-costs-section>
  <!-- ============ STICKY FOOTER - ZAWSZE WIDOCZNY ============ -->
  <app-kitchen-page-footer
    [totalCabinetCount]="totalCabinetCount()"
    [projectResult]="projectResult"
    [adjustedTotalCost]="adjustedTotalCost"
    [wallsCount]="walls().length"
    [isSavingProject]="isSavingProject"
    [isCalculatingProject]="isCalculatingProject"
    [editingCabinetId]="editingCabinetId"
    [currentProjectId]="currentProjectId()"
    [isExporting]="isExporting"
    (saveProject)="onSaveProject()"
    (calculateProject)="calculateProject()"
    (clearAll)="clearAll()"
    (downloadExcel)="downloadExcel()">
  </app-kitchen-page-footer>
</div>
