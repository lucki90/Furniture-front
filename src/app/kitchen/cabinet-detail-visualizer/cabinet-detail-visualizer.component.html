@if (cabinetInput(); as cab) {
  <svg
    [attr.width]="svgWidth()"
    [attr.height]="svgHeight()"
    [attr.viewBox]="'0 0 ' + svgWidth() + ' ' + svgHeight()"
    class="cabinet-detail-svg">

    <defs>
      <linearGradient id="frontGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
      </linearGradient>

      <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#bcaaa4;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#d7ccc8;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#bcaaa4;stop-opacity:1" />
      </linearGradient>

      <linearGradient id="countertopGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#8d6e63;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#6d4c41;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
      </linearGradient>

      <linearGradient id="plinthGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#424242;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#212121;stop-opacity:1" />
      </linearGradient>

      <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
      </filter>
    </defs>

    @if (showCountertop) {
      <rect
        [attr.x]="bodyX - 3"
        [attr.y]="SVG_PADDING"
        [attr.width]="bodyWidth + 6"
        [attr.height]="countertopHeightScaled"
        fill="url(#countertopGradient)"
        stroke="#4e342e"
        stroke-width="0.5"
        rx="1"
        filter="url(#dropShadow)">
        <title>Blat</title>
      </rect>
    }

    <rect
      [attr.x]="bodyX"
      [attr.y]="bodyY"
      [attr.width]="bodyWidth"
      [attr.height]="bodyHeightScaled"
      fill="url(#bodyGradient)"
      stroke="#8d6e63"
      stroke-width="0.5"
      rx="1">
      <title>Korpus: {{ cab.width }}x{{ bodyHeight() }}mm</title>
    </rect>

    @if (geometry(); as layout) {
      <app-cabinet-detail-fronts-layer
        [fronts]="fronts()"
        [geometry]="layout"
        [defaultHandle]="visualConfig()?.defaultHandle"
        [frontStroke]="frontStroke"
        [hingeColor]="hingeColor">
      </app-cabinet-detail-fronts-layer>
    }

    @if (showPlinth) {
      <rect
        [attr.x]="bodyX + plinthSetback"
        [attr.y]="baseY"
        [attr.width]="bodyWidth - plinthSetback * 2"
        [attr.height]="baseHeightScaled"
        fill="url(#plinthGradient)"
        stroke="#1a1a1a"
        stroke-width="0.5"
        rx="1"
        class="plinth">
        <title>Cokol: {{ baseHeight() }}mm</title>
      </rect>
    }

    @if (showFeet) {
      @for (foot of getFeetPositions(); track $index) {
        <g class="foot">
          <rect
            [attr.x]="foot.x - 4"
            [attr.y]="baseY"
            width="8"
            [attr.height]="baseHeightScaled"
            [attr.fill]="getFeetColor()"
            stroke="#424242"
            stroke-width="0.5"
            rx="2">
            <title>Nozka</title>
          </rect>
          <ellipse
            [attr.cx]="foot.x"
            [attr.cy]="foot.y"
            rx="5"
            ry="2"
            fill="#37474f"
            class="foot-base"/>
        </g>
      }
    }

    <line
      [attr.x1]="bodyX - 5"
      [attr.y1]="svgHeight() - SVG_PADDING + 2"
      [attr.x2]="bodyX + bodyWidth + 5"
      [attr.y2]="svgHeight() - SVG_PADDING + 2"
      stroke="#5d4037"
      stroke-width="2"
      class="floor-line"/>

  </svg>
} @else {
  <app-empty-state
    [compact]="true"
    message="Brak danych szafki">
  </app-empty-state>
}
