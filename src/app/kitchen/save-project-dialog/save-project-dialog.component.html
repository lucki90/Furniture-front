<div class="dialog-container">
  <h2 class="dialog-title">{{ dialogTitle }}</h2>

  <div class="dialog-content">
    <div class="form-group">
      <label class="form-label" for="projectName">Nazwa projektu *</label>
      <input
        type="text"
        id="projectName"
        class="form-control"
        [(ngModel)]="projectName"
        placeholder="np. Kuchnia Kowalskich"
        autofocus>
      <span class="form-hint" *ngIf="!projectName.trim()">Nazwa jest wymagana</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="projectDescription">Opis (opcjonalnie)</label>
      <textarea
        id="projectDescription"
        class="form-control"
        [(ngModel)]="projectDescription"
        placeholder="np. Biała kuchnia w kształcie L, fronty lakierowane"
        rows="3">
      </textarea>
    </div>

    <hr class="section-divider">
    <p class="section-label">Dane klienta (opcjonalne — używane w ofercie PDF)</p>

    <div class="form-group">
      <label class="form-label" for="clientName">Imię / nazwa klienta</label>
      <input
        type="text"
        id="clientName"
        class="form-control"
        [(ngModel)]="clientName"
        placeholder="np. Jan Kowalski">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="clientPhone">Telefon</label>
        <input
          type="tel"
          id="clientPhone"
          class="form-control"
          [(ngModel)]="clientPhone"
          placeholder="np. +48 600 100 200">
      </div>
      <div class="form-group">
        <label class="form-label" for="clientEmail">E-mail</label>
        <input
          type="email"
          id="clientEmail"
          class="form-control"
          [(ngModel)]="clientEmail"
          placeholder="np. jan.kowalski@email.pl">
      </div>
    </div>
  </div>

  <div class="dialog-actions">
    <button class="btn btn-secondary" (click)="onCancel()">Anuluj</button>
    <button class="btn btn-primary" (click)="onSave()" [disabled]="!isValid">
      {{ submitLabel }}
    </button>
  </div>
</div>
