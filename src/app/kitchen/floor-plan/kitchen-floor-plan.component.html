<div class="floor-plan-container">
  <svg class="floor-plan-svg" [attr.viewBox]="'0 0 320 240'">
    <defs>
      <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
        <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>

    @for (pos of wallPositions(); track pos.wall.id) {
      <g
        appFloorPlanWallGroup
        [wallPosition]="pos"
        [cabinets]="getCabinetsForWall(pos)"
        [countertops]="getCountertopsForWall(pos)"
        [selected]="isSelected(pos.wall.id)"
        [canRemoveWall]="canRemoveWall()"
        [editingCabinetId]="editingCabinetId"
        [showCountertop]="showCountertop()"
        [showUpperCabinets]="showUpperCabinets()"
        (wallSelected)="onWallClick($event)"
        (wallRemoved)="onRemoveWall($event)">
      </g>
    }

    <g
      appFloorPlanOverlayLayer
      [showCountertop]="showCountertop()"
      [showDoorArcs]="showDoorArcs()"
      [cornerCountertops]="cornerCountertopPositions()"
      [doorArcs]="doorArcData()">
    </g>
  </svg>

  <div class="floor-plan-toolbar">
    <label class="fp-toggle">
      <input type="checkbox" [checked]="showDoorArcs()" (change)="showDoorArcs.set(!showDoorArcs())">
      🚪 Otwarcie drzwi
    </label>
  </div>

  <div class="selected-wall-info">
    @for (pos of wallPositions(); track pos.wall.id) {
      @if (isSelected(pos.wall.id)) {
        <span class="wall-info-selected">
          <strong>{{ getWallLabel(pos.wall.type) }}</strong>
          {{ pos.wall.widthMm }}×{{ pos.wall.heightMm }}mm
          · {{ pos.wall.cabinets.length }} szafek
        </span>
      }
    }
    @if (wallPositions().length === 0) {
      <span class="empty-hint">Kliknij "+ Ściana"</span>
    }
  </div>
</div>
