<div class="enclosure-section" [formGroup]="form">
  <h4 class="section-title">Obudowa boczna</h4>

  <div class="enclosure-row">

    <!-- Strona lewa -->
    <div class="enclosure-side">
      <span class="enclosure-side-label">Lewa strona</span>
      <div class="form-group">
        <label class="form-label">Typ obudowy</label>
        <select class="form-control" formControlName="leftEnclosureType">
          <option *ngFor="let opt of enclosureOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>
      <div *ngIf="isLeftParallelFiller" class="form-group enclosure-support-group">
        <label class="form-label enclosure-checkbox-label">
          <input type="checkbox" formControlName="leftSupportPlate" class="enclosure-checkbox" />
          Podpora blendy
        </label>
      </div>
      <div *ngIf="isLeftParallelFiller" class="form-group enclosure-distance-group">
        <label class="form-label" for="leftFillerW">Szerokość blendy (override)</label>
        <div class="input-with-unit">
          <input id="leftFillerW" type="number" class="form-control form-control-sm"
                 formControlName="leftFillerWidthOverrideMm"
                 [placeholder]="'domyślnie ' + stateService.fillerWidthMm()"
                 min="20" max="200" step="5" />
          <span class="unit">mm</span>
        </div>
      </div>
    </div>

    <!-- Strona prawa -->
    <div class="enclosure-side">
      <span class="enclosure-side-label">Prawa strona</span>
      <div class="form-group">
        <label class="form-label">Typ obudowy</label>
        <select class="form-control" formControlName="rightEnclosureType">
          <option *ngFor="let opt of enclosureOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>
      <div *ngIf="isRightParallelFiller" class="form-group enclosure-support-group">
        <label class="form-label enclosure-checkbox-label">
          <input type="checkbox" formControlName="rightSupportPlate" class="enclosure-checkbox" />
          Podpora blendy
        </label>
      </div>
      <div *ngIf="isRightParallelFiller" class="form-group enclosure-distance-group">
        <label class="form-label" for="rightFillerW">Szerokość blendy (override)</label>
        <div class="input-with-unit">
          <input id="rightFillerW" type="number" class="form-control form-control-sm"
                 formControlName="rightFillerWidthOverrideMm"
                 [placeholder]="'domyślnie ' + stateService.fillerWidthMm()"
                 min="20" max="200" step="5" />
          <span class="unit">mm</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Głębokość zabudowy (override) -->
  <div class="form-group enclosure-distance-group">
    <label class="form-label" for="distanceFromWallMm">Głębokość zabudowy (override)</label>
    <div class="input-with-unit">
      <input
        id="distanceFromWallMm"
        type="number"
        class="form-control form-control-sm"
        formControlName="distanceFromWallMm"
        [placeholder]="'domyślnie ' + stateService.distanceFromWallMm()"
        min="400"
        max="700"
        step="10" />
      <span class="unit">mm</span>
    </div>
    <p class="form-hint">Puste = wartość z ustawień globalnych ({{ stateService.distanceFromWallMm() }} mm)</p>
  </div>
</div>
