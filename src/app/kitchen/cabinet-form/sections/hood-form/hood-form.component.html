<div class="sink-section" [formGroup]="form">
  <h4 class="section-title">Konfiguracja szafki na okap</h4>

  <!-- Typ frontu okapu -->
  <div class="form-row">
    <div class="form-group flex-2">
      <label class="form-label">Typ frontu</label>
      <select class="form-control" formControlName="hoodFrontType">
        <option *ngFor="let o of dictionaryService.data().hoodFrontTypes" [value]="o.code">{{ o.label }}</option>
      </select>
    </div>
  </div>

  <!-- Blenda wewnętrzna maskująca okap -->
  <div class="form-row">
    <div class="form-group flex-2">
      <label class="form-label enclosure-checkbox-label">
        <input type="checkbox" formControlName="hoodScreenEnabled" class="enclosure-checkbox">
        Blenda wewnętrzna (maskuje mechanizm okapu)
      </label>
      <span class="form-hint">Panel poziomy w przedniej części szafki, zasłaniający sterowanie okapu</span>
    </div>
  </div>

  <!-- Wysokość blendy — widoczna gdy blenda włączona -->
  <div class="form-row" *ngIf="showHoodScreenHeight">
    <div class="form-group flex-1">
      <label class="form-label">Wysokość blendy wewnętrznej (mm)</label>
      <input type="number" class="form-control" formControlName="hoodScreenHeightMm"
             min="50" max="200" step="10">
      <span class="form-hint">50–200mm (domyślnie 100mm)</span>
      <span class="form-error" *ngIf="form.get('hoodScreenHeightMm')?.errors?.['outOfRange']">
        Wysokość blendy musi mieścić się w zakresie 50–200mm
      </span>
    </div>
  </div>
</div>
